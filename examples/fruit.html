<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fruit of the Day</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui;
            background: #fefefe;
        }
        p {
            font-size: 40px;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <p id="message"></p>
    <script>
        const fruits = [
            "🍓 Strawberry",
            "🥭 Mango",
            "🫐 Blueberry",
            "🍍 Pineapple",
            "🍉 Watermelon",
            "🍑 Peach",
            "🍌 Banana"
        ];
        const today = new Date();
        const dayOfWeek = today.getDay();
        document.getElementById("message").textContent =
            "The fruit of the day is " + fruits[dayOfWeek];
    </script>
</body>
</html>
